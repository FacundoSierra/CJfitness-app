{% extends "base.html" %}

{% block title %}En construcción — CJFitness{% endblock %}
{% block page_title %}En construcción{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center py-5" style="min-height: 60vh;">

    <div class="mb-4" style="
        width: 72px; height: 72px;
        background: var(--clr-gold-soft, rgba(212,144,10,0.1));
        border-radius: 20px;
        display: flex; align-items: center; justify-content: center;
        font-size: 2rem; color: var(--clr-gold, #d4900a);
    ">
        <i class="bi bi-tools"></i>
    </div>

    <h1 style="font-size: 1.6rem; font-weight: 800; margin-bottom: 10px;">
        Próximamente
    </h1>

    <p style="color: var(--clr-muted, #6b7a99); max-width: 380px; line-height: 1.7; margin-bottom: 32px;">
        Esta sección está en desarrollo. Estamos trabajando para traértela lo antes posible.
    </p>

    <a href="{{ url_for('dashboard') }}" class="btn btn-primary" style="
        background: var(--clr-gold, #d4900a);
        border: none;
        border-radius: 10px;
        padding: 10px 24px;
        font-weight: 600;
    ">
        <i class="bi bi-arrow-left me-2"></i>Volver al Panel
    </a>

</div>
{% endblock %}
