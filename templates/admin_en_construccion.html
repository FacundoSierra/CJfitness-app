{% extends "base_admin.html" %}
{% block title %}Sección en Construcción{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center text-center" style="min-height: 62vh;">
    <div class="mb-3">
        <i class="bi bi-tools display-2 "></i>
    </div>
    <h1 class="mb-3 text-main fw-bold">{{ titulo }}</h1>
    <p class="lead text-soft" style="max-width: 420px; margin: 0 auto;">
        {{ mensaje or "Estamos trabajando en esta sección para ofrecerte la mejor experiencia. ¡Muy pronto estará disponible!" }}
    </p>
    <a href="{{ url_for('admin_dashboard') }}" class="btn btn-outline-primary mt-4" data-bs-toggle="tooltip" title="Volver al panel principal">
        <i class="bi bi-arrow-left-circle"></i> Volver al Dashboard
    </a>
</div>
{% endblock %}
