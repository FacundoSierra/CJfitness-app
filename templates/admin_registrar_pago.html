{% extends "base_admin.html" %}
{% block title %}Registrar Pago{% endblock %}

{% block content %}
<div class="page-header">
    <div>
        <h1 class="page-title">Registrar Pago</h1>
        <p class="page-subtitle">Completa la información del pago para registrarlo en el sistema</p>
    </div>
    <a href="{{ url_for('admin_pagos') }}" class="btn btn-secondary">
        <i class="bi bi-arrow-left me-1"></i>Volver
    </a>
</div>

<div class="card" style="max-width: 800px;">
    <form method="POST" action="{{ url_for('admin_registrar_pago') }}">
        <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap: var(--space-4);">
            <div class="form-group">
                <label class="form-label">Usuario <span style="color:var(--color-danger);">*</span></label>
                <select class="form-control" name="usuario_id" required>
                    <option value="">Seleccionar usuario...</option>
                    {% for usuario in usuarios %}
                    <option value="{{ usuario.id }}">{{ usuario.nombre }} {{ usuario.apellidos }} ({{ usuario.email }})</option>
                    {% endfor %}
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Cantidad (€) <span style="color:var(--color-danger);">*</span></label>
                <input type="number" class="form-control" name="cantidad" step="0.01" min="0" required>
            </div>
        </div>

        <div class="form-row" style="display:grid; grid-template-columns:1fr 1fr; gap: var(--space-4);">
            <div class="form-group">
                <label class="form-label">Método de Pago <span style="color:var(--color-danger);">*</span></label>
                <select class="form-control" name="metodo_pago" required>
                    <option value="">Seleccionar método...</option>
                    <option value="efectivo">Efectivo</option>
                    <option value="transferencia">Transferencia</option>
                    <option value="tarjeta">Tarjeta</option>
                    <option value="paypal">PayPal</option>
                    <option value="bizum">Bizum</option>
                    <option value="manual">Manual</option>
                </select>
            </div>
            <div class="form-group">
                <label class="form-label">Forma de Pago <span style="color:var(--color-text-secondary); font-weight:400;">(opcional)</span></label>
                <input type="text" class="form-control" name="forma_pago"
                       placeholder="Ej: Transferencia a cuenta, efectivo en gimnasio...">
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">Observaciones</label>
            <textarea class="form-control" name="observaciones" rows="3"
                      placeholder="Notas adicionales..."></textarea>
        </div>

        <div style="display:flex; gap: var(--space-2);">
            <button type="submit" class="btn btn-primary">
                <i class="bi bi-save me-1"></i>Registrar Pago
            </button>
            <a href="{{ url_for('admin_pagos') }}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
